name: Build ArchISO

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    container:
      image: archlinux:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update system
        run: |
          pacman -Syyu --noconfirm

      - name: Fix Arch mirrors
        run: |
          tee /etc/pacman.d/mirrorlist << 'EOF'
          Server = https://mirror.rackspace.com/archlinux/$repo/os/$arch
          Server = https://mirror.osbeck.com/archlinux/$repo/os/$arch
          Server = https://arch.mirror.constant.com/$repo/os/$arch
          EOF
          pacman -Syy --noconfirm

      - name: Install archiso
        run: |
          pacman -S --noconfirm archiso

      - name: Initialize pacman keyring
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Add Chaotic-AUR keys
        run: |
          pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 3056513887B78AEB

          pacman-key --recv-key 349BC7808577C592 --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 349BC7808577C592

          pacman-key --recv-key FBA220DFC880C036 --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key FBA220DFC880C036

      - name: Add Chaotic-AUR repository
        run: |
          tee -a /etc/pacman.conf << 'EOF'
          [chaotic-aur]
          Server = https://cdn-mirror.chaotic.cx/$repo/$arch
          EOF

          pacman -Syy --noconfirm chaotic-keyring chaotic-mirrorlist

      - name: Build ISO
        run: |
          mkarchiso -v -w work -o out archiso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArchInstaller-ISO
          path: out/*.iso
