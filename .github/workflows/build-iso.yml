name: Build ISO

on:
  push:
    branches: [ "dev" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------
      # FIX OFFICIAL ARCH MIRRORS
      # -----------------------------
      - name: Replace Arch mirrorlist with stable mirrors
        run: |
          cat > /etc/pacman.d/mirrorlist << 'EOF'
          Server = https://mirror.rackspace.com/archlinux/$repo/os/$arch
          Server = https://mirror.osbeck.com/archlinux/$repo/os/$arch
          Server = https://arch.mirror.constant.com/$repo/os/$arch
          Server = https://mirror.leaseweb.net/archlinux/$repo/os/$arch
          EOF

      # -----------------------------
      # INIT PACMAN KEYS
      # -----------------------------
      - name: Initialize pacman keys
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      # -----------------------------
      # INSTALL CHAOTIC KEYRING MANUALLY
      # -----------------------------
      - name: Download Chaotic-AUR keyring
        run: |
          curl -LO https://raw.githubusercontent.com/chaotic-aur/chaotic-keyring/master/chaotic.gpg
          curl -LO https://raw.githubusercontent.com/chaotic-aur/chaotic-keyring/master/chaotic-trusted

      - name: Install Chaotic-AUR keyring
        run: |
          install -Dm644 chaotic.gpg /usr/share/pacman/keyrings/chaotic.gpg
          install -Dm644 chaotic-trusted /usr/share/pacman/keyrings/chaotic-trusted

      # -----------------------------
      # INSTALL STATIC CHAOTIC MIRRORLIST
      # -----------------------------
      - name: Install static Chaotic-AUR mirrorlist
        run: |
          install -Dm644 chaotic-mirrorlist /etc/pacman.d/chaotic-mirrorlist

      # -----------------------------
      # ENABLE CHAOTIC-AUR REPO
      # -----------------------------
      - name: Add Chaotic-AUR repo
        run: |
          echo "" >> /etc/pacman.conf
          echo "[chaotic-aur]" >> /etc/pacman.conf
          echo "Include = /etc/pacman.d/chaotic-mirrorlist" >> /etc/pacman.conf

      # -----------------------------
      # UPDATE PACMAN
      # -----------------------------
      - name: Update pacman
        run: pacman -Syy

      # -----------------------------
      # INSTALL ARCHISO
      # -----------------------------
      - name: Install archiso
        run: pacman -Sy --noconfirm archiso git

      # -----------------------------
      # FIX LINE ENDINGS
      # -----------------------------
      - name: Fix line endings
        run: sed -i 's/\r$//' build_iso.sh

      # -----------------------------
      # BUILD ISO
      # -----------------------------
      - name: Build ISO
        run: bash ./build_iso.sh

      # -----------------------------
      # UPLOAD RESULT
      # -----------------------------
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-custom
          path: out/*.iso
