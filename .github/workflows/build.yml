name: Build ArchInstaller ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest

    # Запускаем job внутри контейнера Arch Linux
    container:
      image: archlinux:latest

    steps:
      - name: Install base tools
        run: |
          pacman -Sy --noconfirm git base-devel archiso

      - name: Checkout repository
        uses: actions/checkout@v4

      # Если у тебя профиль archiso лежит в ./archiso
      # и там есть releng-подобная структура
      - name: Build ISO
        run: |
          mkdir -p out
          cd archiso
          # классическая команда сборки
          mkarchiso -v -w ./work -o ../out .

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArchInstaller-ISO
          path: out/*.iso
