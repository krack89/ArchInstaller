name: Build ISO

on:
  push:
    branches: [ "dev" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize pacman keys
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Download Chaotic-AUR keyring and mirrorlist manually
        run: |
          curl -LO https://builds.garudalinux.org/repos/chaotic-aur/x86_64/chaotic-keyring-20240202-1-any.pkg.tar.zst
          curl -LO https://builds.garudalinux.org/repos/chaotic-aur/x86_64/chaotic-mirrorlist-20240202-1-any.pkg.tar.zst

      - name: Extract keyring and mirrorlist manually
        run: |
          bsdtar -xvf chaotic-keyring-*.pkg.tar.zst -C /
          bsdtar -xvf chaotic-mirrorlist-*.pkg.tar.zst -C /

      - name: Add Chaotic-AUR repo
        run: |
          echo "" >> /etc/pacman.conf
          echo "[chaotic-aur]" >> /etc/pacman.conf
          echo "Include = /etc/pacman.d/chaotic-mirrorlist" >> /etc/pacman.conf

      - name: Update pacman
        run: pacman -Syy

      - name: Install archiso
        run: pacman -Sy --noconfirm archiso git

      - name: Fix line endings
        run: sed -i 's/\r$//' build_iso.sh

      - name: Build ISO
        run: bash ./build_iso.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-custom
          path: out/*.iso
