name: Build ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Arch in container
      uses: archlinux/archlinux-docker@v1
      with:
        run: |
          pacman -Sy --noconfirm archiso git

          # Линии перевода на всякий
          sed -i 's/\r$//' build_iso.sh

          chmod +x build_iso.sh
          ./build_iso.sh

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: archlinux-custom
        path: out/*.iso
