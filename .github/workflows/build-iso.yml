name: Build ISO

on:
  push:
    branches: [ "dev" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize pacman keys
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Add Chaotic-AUR key
        run: |
          pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
          pacman-key --lsign-key 3056513887B78AEB

      - name: Add Chaotic-AUR repo (WITHOUT mirrorlist include)
        run: |
          echo "" >> /etc/pacman.conf
          echo "[chaotic-aur]" >> /etc/pacman.conf
          echo "Server = https://cdn-mirror.chaotic.cx/\$repo/\$arch" >> /etc/pacman.conf

      - name: Install chaotic-keyring and mirrorlist
        run: pacman -Sy --noconfirm chaotic-keyring chaotic-mirrorlist

      - name: Replace temporary server with mirrorlist include
        run: |
          sed -i 's|Server = https://cdn-mirror.chaotic.cx/\$repo/\$arch|Include = /etc/pacman.d/chaotic-mirrorlist|' /etc/pacman.conf

      - name: Update pacman databases
        run: pacman -Syy

      - name: Install archiso
        run: pacman -Sy --noconfirm archiso git

      - name: Fix line endings
        run: sed -i 's/\r$//' build_iso.sh

      - name: Build ISO
        run: bash ./build_iso.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-custom
          path: out/*.iso
