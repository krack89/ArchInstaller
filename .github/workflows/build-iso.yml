name: Build ArchISO

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install archiso
        run: |
          sudo pacman -Syy --noconfirm archiso

      - name: Fix Arch mirrors (avoid geo.mirror.pkgbuild.com)
        run: |
          sudo tee /etc/pacman.d/mirrorlist << 'EOF'
          Server = https://mirror.rackspace.com/archlinux/$repo/os/$arch
          Server = https://mirror.osbeck.com/archlinux/$repo/os/$arch
          Server = https://arch.mirror.constant.com/$repo/os/$arch
          EOF
          sudo pacman -Syy --noconfirm

      - name: Add Chaotic-AUR repository
        run: |
          sudo pacman-key --recv-key 3056513887B78AEB --keyserver keyserver.ubuntu.com
          sudo pacman-key --lsign-key 3056513887B78AEB

          sudo tee -a /etc/pacman.conf << 'EOF'
          [chaotic-aur]
          Server = https://cdn-mirror.chaotic.cx/$repo/$arch
          EOF

          sudo pacman -Syy --noconfirm chaotic-keyring chaotic-mirrorlist

      - name: Install Calamares dependencies
        run: |
          sudo pacman -S --noconfirm \
            calamares \
            calamares-config \
            qt5-base \
            qt5-svg \
            qt5-tools \
            kpmcore \
            squashfs-tools \
            yaml-cpp \
            boost-libs

      - name: Build ISO
        run: |
          sudo mkarchiso -v -w work -o out archiso

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ArchInstaller-ISO
          path: out/*.iso
