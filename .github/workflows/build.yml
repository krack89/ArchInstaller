name: Build ISO

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install ArchISO
      run: |
        sudo pacman -Sy --noconfirm archiso

    - name: Convert line endings
      run: |
        sudo sed -i 's/\r$//' build_iso.sh

    - name: Build ISO
      run: sudo ./build_iso.sh

    - name: Upload ISO
      uses: actions/upload-artifact@v4
      with:
        name: archlinux-custom
        path: out/*.iso
