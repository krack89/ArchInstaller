name: Build ISO

on:
  push:
    branches: [ "dev" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install new Arch mirrorlist
        run: |
          install -Dm644 mirrorlist-arch /etc/pacman.d/mirrorlist

      - name: Initialize pacman keys
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      - name: Download Chaotic-AUR keyring
        run: |
          curl -LO https://raw.githubusercontent.com/chaotic-aur/chaotic-keyring/master/chaotic.gpg
          curl -LO https://raw.githubusercontent.com/chaotic-aur/chaotic-keyring/master/chaotic-trusted

      - name: Install Chaotic-AUR keyring
        run: |
          install -Dm644 chaotic.gpg /usr/share/pacman/keyrings/chaotic.gpg
          install -Dm644 chaotic-trusted /usr/share/pacman/keyrings/chaotic-trusted

      - name: Install static Chaotic-AUR mirrorlist
        run: |
          install -Dm644 chaotic-mirrorlist /etc/pacman.d/chaotic-mirrorlist

      - name: Add Chaotic-AUR repo
        run: |
          echo "" >> /etc/pacman.conf
          echo "[chaotic-aur]" >> /etc/pacman.conf
          echo "Include = /etc/pacman.d/chaotic-mirrorlist" >> /etc/pacman.conf

      - name: Update pacman
        run: pacman -Syy

      - name: Install archiso
        run: pacman -Sy --noconfirm archiso git

      - name: Fix line endings
        run: sed -i 's/\r$//' build_iso.sh

      - name: Build Calamares
        run: |
          pacman -Sy --noconfirm \
            base-devel \
            cmake \
            extra-cmake-modules \
            git \
            qt5-base \
            qt5-tools \
            qt5-svg \
            qt5-xmlpatterns \
            boost \
            boost-libs \
            yaml-cpp \
            kpmcore \
            polkit-qt5 \
            libpwquality \
            parted

          git clone https://github.com/calamares/calamares.git
          cd calamares
          mkdir build && cd build
          cmake .. -DCMAKE_INSTALL_PREFIX=/usr -DWITH_QT6=OFF -DWITH_QT5=ON
          make -j"$(nproc)"
          make DESTDIR=/tmp/calamares-install install

      - name: Install Calamares into airootfs
        run: |
          mkdir -p profile/airootfs/usr
          cp -r /tmp/calamares-install/usr/* airootfs/usr/

      - name: Build ISO
        run: bash ./build_iso.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-custom
          path: out/*.iso


