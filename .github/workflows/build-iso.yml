name: Build ISO

on:
  push:
    branches: [ "dev" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize pacman keys
        run: |
          pacman-key --init
          pacman-key --populate archlinux

      # -----------------------------
      # INSTALL CHAOTIC KEYRING MANUALLY
      # -----------------------------
      - name: Download Chaotic-AUR keyring
        run: |
          curl -LO https://raw.githubusercontent.com/chaotic-aur/chaotic-keyring/master/chaotic.gpg
          curl -LO https://raw.githubusercontent.com/chaotic-aur/chaotic-keyring/master/chaotic-trusted

      - name: Install Chaotic-AUR keyring
        run: |
          install -Dm644 chaotic.gpg /usr/share/pacman/keyrings/chaotic.gpg
          install -Dm644 chaotic-trusted /usr/share/pacman/keyrings/chaotic-trusted

      # -----------------------------
      # DOWNLOAD MIRRORLIST WITH USER-AGENT
      # -----------------------------
      - name: Download Chaotic-AUR mirrorlist
        run: |
          curl -A "Mozilla/5.0" -Lo /etc/pacman.d/chaotic-mirrorlist \
            https://cdn-mirror.chaotic.cx/mirrorlist.txt

          # Проверка, что mirrorlist настоящий, а не HTML
          if grep -qi "<html" /etc/pacman.d/chaotic-mirrorlist; then
            echo "ERROR: mirrorlist.txt is HTML (404 or CDN blocked)"
            cat /etc/pacman.d/chaotic-mirrorlist
            exit 1
          fi

      # -----------------------------
      # ENABLE CHAOTIC-AUR REPO
      # -----------------------------
      - name: Add Chaotic-AUR repo
        run: |
          echo "" >> /etc/pacman.conf
          echo "[chaotic-aur]" >> /etc/pacman.conf
          echo "Include = /etc/pacman.d/chaotic-mirrorlist" >> /etc/pacman.conf

      # -----------------------------
      # UPDATE PACMAN
      # -----------------------------
      - name: Update pacman
        run: pacman -Syy

      # -----------------------------
      # INSTALL ARCHISO
      # -----------------------------
      - name: Install archiso
        run: pacman -Sy --noconfirm archiso git

      # -----------------------------
      # FIX LINE ENDINGS
      # -----------------------------
      - name: Fix line endings
        run: sed -i 's/\r$//' build_iso.sh

      # -----------------------------
      # BUILD ISO
      # -----------------------------
      - name: Build ISO
        run: bash ./build_iso.sh

      # -----------------------------
      # UPLOAD RESULT
      # -----------------------------
      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: archlinux-custom
          path: out/*.iso
